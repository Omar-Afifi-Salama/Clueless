<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="Clueless - Project Idea for Developers">
    <meta property="og:description"
        content="Stop cycling through the same basic todo lists and weather apps. Clueless generates realistic, well-scoped project ideas tailored to your exact tech stack, complete with logical difficulty ratings and time estimates.">
    <meta property="og:image" content="https://clueless-dev.vercel.app/assets/brand-banner.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="400">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://clueless-dev.vercel.app/assets/brand-banner.png">

    <title>Clueless | Project Idea Generator</title>

    <link rel="icon" type="image/png" href="../assets/favicon.png">

    <link rel="stylesheet" href="../css/styles.min.css">
    <link rel="preload" href="../data/words.min.json" as="fetch" type="application/json" crossorigin="anonymous">

    <script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script defer src="../scripts/navbar.min.js"></script>
    <script defer src="../scripts/app.min.js"></script>
</head>

<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-brand">CLUELESS <span>// ENGINE</span></a>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="./how-it-works.html">How It Works</a>

                <div class="nav-controls">
                    <div class="accent-dropdown">
                        <button id="accent-menu-btn" title="Choose Accent Color">
                            <span class="color-preview-dot"></span>
                        </button>
                        <div class="accent-menu-palette" id="accent-palette"></div>
                    </div>
                    <button id="theme-toggle">☀️ Light Mode</button>
                </div>

                <a href="https://github.com/Omar-Afifi-Salama/Clueless" class="nav-gh-link" title="View on GitHub"
                    target="_blank" rel="noopener">
                    <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" />
                    </svg>
                </a>
                <a href="./app.html" class="nav-cta active">Launch App</a>
            </div>
        </div>
    </nav>

    <main>
        <header>
            <h1>Clueless</h1>
            <p>A Coding Project Idea Generator</p>
        </header>

        <hr>

        <section>
            <h2>Idea Generator</h2>
            <div class="idea-container">Empty...</div>
            <div class="controls">
                <label for="paradigm">Choose Paradigm</label>
                <select id="paradigm" name="paradigm">
                    <option value="">Randomize</option>
                </select>

                <label for="format">Choose Format</label>
                <select id="format" name="format">
                    <option value="">Randomize</option>
                </select>

                <label for="domain">Choose Domain</label>
                <select id="domain" name="domain">
                    <option value="">Randomize</option>
                </select>

                <label for="tech-stack">Choose Tech Stack</label>
                <select id="tech-stack" name="tech-stack">
                    <option value="">Randomize</option>
                </select>

                <label for="audience">Choose Audience</label>
                <select id="audience" name="audience">
                    <option value="">Randomize</option>
                </select>

                <button id="generateButton">Generate</button>
                <button id="favoriteButton">Favorite</button>
            </div>
        </section>

        <hr>

        <section>
            <h2>Favorites</h2>
            <button id="clear-favorites">Clear Favorites</button>
            <div class="list-scroll-window">
                <ol reversed id="favorite-list"></ol>
            </div>

            <div class="export-container" data-collection="favorites">
                <select class="export-format">
                    <option value="">Select Format</option>
                    <option value="txt">Text (.txt)</option>
                    <option value="md">Markdown (.md)</option>
                    <option value="xlsx">Excel (.xlsx)</option>
                    <option value="json">JSON (.json)</option>
                </select>
                <button class="export-trigger-btn">Export Favorites</button>
            </div>
        </section>

        <hr>

        <section>
            <h2>History</h2>
            <button id="clear-history">Clear History</button>
            <div class="list-scroll-window">
                <ol reversed id="history-list"></ol>
            </div>

            <div class="export-container" data-collection="history">
                <select class="export-format">
                    <option value="">Select Format</option>
                    <option value="txt">Text (.txt)</option>
                    <option value="md">Markdown (.md)</option>
                    <option value="xlsx">Excel (.xlsx)</option>
                    <option value="json">JSON (.json)</option>
                </select>
                <button class="export-trigger-btn">Export History</button>
            </div>
        </section>
    </main>
</body>

</html>
